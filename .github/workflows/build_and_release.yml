name: Build and Release RGit

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Build Release APKs (Skip Tests)
        # * Call gradle directly instead of local gradlew wrapper
        run: gradle assembleRelease -x test

      - name: Organize and Rename APKs
        run: |
          mkdir -p output_apks
          find app/build/outputs/apk/release -name "*.apk" -exec cp {} output_apks/ \;
          cd output_apks

          for file in *.apk; do
            new_name=$(echo "$file" | sed 's/app-/rgit-/g' | sed 's/-release//g' | sed 's/-unsigned//g')
            mv "$file" "$new_name"
          done

      - name: Publish Release (as micro-acp)
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_PAT }}
        with:
          files: output_apks/*.apk
          draft: false
          prerelease: false
          generate_release_notes: true