name: Build and Release RGit

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APKs (Skip Tests)
        # * -x test explicitly ignores all testing steps to save time
        run: ./gradlew assembleRelease -x test

      - name: Organize and Rename APKs
        run: |
          mkdir -p output_apks
          # * Find all generated release APKs and copy them to output_apks folder
          find app/build/outputs/apk/release -name "*.apk" -exec cp {} output_apks/ \;
          cd output_apks

          # * Rename files for a cleaner release (e.g., app-arm64-v8a-release.apk -> rgit-arm64-v8a.apk)
          for file in *.apk; do
            new_name=$(echo "$file" | sed 's/app-/rgit-/g' | sed 's/-release//g' | sed 's/-unsigned//g')
            mv "$file" "$new_name"
          done

      - name: Publish Release (as micro-acp)
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_PAT }}
        with:
          files: output_apks/*.apk
          draft: false
          prerelease: false
          generate_release_notes: true