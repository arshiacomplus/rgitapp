name: Manual Release Creator

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'The tag name (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'
      release_body:
        description: 'Release notes'
        required: true
        default: 'Automated release'

permissions:
  contents: write

jobs:
  build:
    name: Build APKs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'
      
      - name: Decode Keystore
        run: echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > rgit-release.jks

      - name: Build and Sign APKs
        # * Inject signing configurations dynamically via Gradle properties
        run: |
          gradle assembleRelease -x test \
            -Pandroid.injected.signing.store.file=$(pwd)/rgit-release.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEY_STORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: app/build/outputs/apk/release/*.apk

  create-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set release commit
        run: echo "RELEASE_COMMIT=$(git rev-parse HEAD)" >> $GITHUB_ENV

      - name: Create tag on specific commit
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag ${{ github.event.inputs.tag_name }} ${{ env.RELEASE_COMMIT }}
          git push origin ${{ github.event.inputs.tag_name }}

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-apks
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ github.event.inputs.tag_name }}
          name: Release ${{ github.event.inputs.tag_name }}
          body: ${{ github.event.inputs.release_body }}
          files: artifacts/*.apk
          draft: false
          prerelease: false