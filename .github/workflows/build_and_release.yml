name: Build and Release RGit

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release Tag (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'
      notes:
        description: 'Release Notes/Description'
        required: true
        default: 'New release of RGit'

jobs:
  build:
    name: Build APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Build Release APKs (Skip Tests)
        run: gradle assembleRelease -x test

      - name: Organize and Rename APKs
        run: |
          mkdir -p output_apks
          find app/build/outputs/apk/release -name "*.apk" -exec cp {} output_apks/ \;
          cd output_apks

          for file in *.apk; do
            new_name=$(echo "$file" | sed 's/app-/rgit-/g' | sed 's/-release//g' | sed 's/-unsigned//g')
            mv "$file" "$new_name"
          done

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_PAT }}
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: Release ${{ github.event.inputs.tag }}
          body: ${{ github.event.inputs.notes }}
          files: output_apks/*.apk
          draft: false
          prerelease: false